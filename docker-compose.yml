version: '3.8'

services:
  ai-designer-app:
    build: .
    container_name: ai_designer_app_container
    ports:
      - "8501:8501"
    environment:
      # Sets the default region for boto3 requests to Bedrock
      - AWS_DEFAULT_REGION=us-east-1
    volumes:
      # Mount your local AWS credentials so the container can authenticate with Amazon Bedrock
      - ~/.aws:/root/.aws:ro
      # Optional: Uncomment below line if you want live hot-reloading while developing without rebuilding the container
      - .:/app
